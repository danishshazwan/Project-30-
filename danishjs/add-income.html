<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">

<body>
<div class="app-container" id="app">
    <div id="income-page" class="screen active nav-screen">
        <div class="page-header">
            <span class="back-btn" onclick="window.location.href='profile.html'">←</span>
            <h2>Income</h2>
        </div>
        <div class="card" style="margin:20px;">
            <h3>Add Income 💵</h3>
            <p>Track your monthly income.</p>
            <div class="input-group" style="margin-top:15px;">
                <label>Monthly Income</label>
                <input type="number" id="income-input" placeholder="RM0.00">
            </div>
            <button class="btn btn-primary" onclick="saveIncome()">Save Income</button>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
