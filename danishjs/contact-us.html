<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Support</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="app-container" id="app">
    <div id="contact-us-page" class="screen active nav-screen">
        <div class="page-header">
            <span class="back-btn" onclick="window.location.href='profile.html'">←</span>
            <h2>Contact Support</h2>
        </div>

        <div class="card" style="margin:20px;">
            <div class="input-group">
                <label>Your Email</label>
                <input type="email" placeholder="email@example.com">
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea style="width:100%; height:120px; border-radius:12px; padding:15px;"></textarea>
            </div>

            <button class="btn btn-primary">Send Message</button>
        </div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: flex;">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">⊞</div><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='stats.html'"><div class="nav-icon">◴</div><span>Stats</span></div>
        <div class="fab" onclick="window.location.href='add-expense.html'">+</div>
        <div class="nav-item" onclick="window.location.href='budget.html'"><div class="nav-icon">👛</div><span>Budget</span></div>
        <div class="nav-item active" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div><span>Profile</span></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
<script src="js/media-handler.js"></script>
<script>
    window.onload = () => {
        if (window.appData.darkMode) document.body.classList.add('dark-mode');
        if (window.appData.user && typeof updateUI === 'function') updateUI();
    };
</script>
</body>
</html>
