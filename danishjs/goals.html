<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="app-container" id="app">
    <div id="goals-page" class="screen active nav-screen">
        <div class="page-header">
            <span class="back-btn" onclick="window.location.href='profile.html'">←</span>
            <h2>Goals</h2>
        </div>
        <div class="card" style="margin:20px;">
            <h3>Set Financial Goals 🎯</h3>
            <p>Track your savings targets.</p>

            <div class="input-group" style="margin-top:15px;">
                <label>Month (YYYY-MM)</label>
                <input type="month" id="goal-month" />
            </div>

            <div class="input-group">
                <label>Target Spending (RM)</label>
                <input type="number" id="goal-target" placeholder="300" min="0" step="0.01" />
            </div>

            <button class="btn btn-primary" type="button" style="margin-top:10px;" id="create-goal-btn">Add / Update Goal</button>

            <div id="goals-summary" style="margin-top:10px; font-weight:900; color:var(--text-main);"></div>

            <div class="card" id="goal-comparison" style="margin:15px 0 0; padding:15px; background:var(--card-bg);">
                <div style="font-weight:900; color:var(--text-main); margin-bottom:6px;">This Month vs Last Month</div>
                <div style="font-size:13px; color:var(--text-sub);"><span id="goal-compare-text">-</span></div>
            </div>

            <div id="goals-list"></div>
        </div>

    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
<script src="js/goals.js"></script>
<script>
    // Initialize Goals UI (goals.js wires itself on DOM ready)

    if (typeof appInitForPage === 'function') appInitForPage();

    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
