<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="app-container" id="app">

    <div id="edit-profile-page" class="screen active">
        <div class="page-header">
            <span class="back-btn" onclick="window.location.href='profile.html'">←</span>
            <h2>Edit Profile</h2>
        </div>
        <div class="card" style="margin:20px; text-align:center;">
            <div class="avatar" id="edit-avatar" style="margin:auto;">DS</div>
            <input type="file" id="edit-image" style="margin-top:10px;">
        </div>
        <div class="card" style="margin:20px;">
            <div class="input-group"><label>Name</label><input type="text" id="edit-name"></div>
            <div class="input-group"><label>Email</label><input type="email" id="edit-email"></div>
            <div class="input-group"><label>New Password</label><input type="password" id="edit-pass" placeholder="Optional"></div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
    if (typeof appInitForPage === 'function') appInitForPage();
    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
