<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="app-container" id="app">

    <div id="dashboard-page" class="screen active nav-screen">
        <div class="dash-header">
            <div class="user-top">
                <div style="display: flex; align-items: center;">
                    <div class="avatar" id="dash-avatar">DS</div>
                    <div>
                        <p style="font-size: 13px;">Welcome back,</p>
                        <h3 id="dash-name">User Name</h3>
                    </div>
                </div>
            </div>
            <div class="balance-section">
                <p>Total Spent This Month</p>
                <h1 id="dash-total-spent">RM0.00</h1>
            </div>
        </div>

        <div class="main-content">
            <div class="recent-header" style="margin-top: 20px;">
                <h3>Recent Transactions</h3>
            </div>
            <div id="transaction-list"></div>


        </div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: flex;">
        <div class="nav-item active" onclick="switchTab('dashboard-page', this)"><div class="nav-icon">⊞</div><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='stats.html'" ><div class="nav-icon">◴</div><span>Stats</span></div>
        <div class="fab" onclick="window.location.href='add-expense.html'">+</div>
        <div class="nav-item" onclick="window.location.href='budget.html'"><div class="nav-icon">👛</div><span>Budget</span></div>
        <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div><span>Profile</span></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
<script src="js/media-dashboard.js"></script>
<script src="js/transaction-details.js"></script>
<script src="js/media-handler.js"></script>
<script>
    if (typeof appInitForPage === 'function') appInitForPage();
    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
