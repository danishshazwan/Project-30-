<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="app-container" id="app">

    <div id="budget-page" class="screen active nav-screen">
        <div class="page-header">
            <h2>Monthly Budget</h2>
            <span style="color: var(--primary); font-weight: 600; cursor: pointer;" onclick="promptBudget()">✎ Edit</span>
        </div>
        <div class="budget-card">
            <p>Remaining Budget</p>
            <h1 id="budget-remaining">RM0.00</h1>
            <div class="progress-bar" style="background: rgba(255,255,255,0.2); margin: 15px 0 5px;">
                <div class="progress-fill" id="budget-bar-fill" style="background: white; width: 0%;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8;">
                <span id="budget-spent-text">Spent: RM0</span>
                <span id="budget-total-text">Total: RM0</span>
            </div>
        </div>
        <div class="budget-alert" id="budget-alert">
            <h4>⚠️ Budget Exceeded</h4>
            <p>You've exceeded your monthly budget limit. Try to cut back on discretionary spending.</p>
        </div>
        <h3 style="margin: 0 20px 15px;">Category Breakdown</h3>
        <div id="budget-category-list"></div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: flex;">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">⊞</div><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='stats.html'"><div class="nav-icon">◴</div><span>Stats</span></div>
        <div class="fab" onclick="document.getElementById('add-modal').style.display='flex'">+</div>
        <div class="nav-item active" onclick="switchTab('budget-page', this)"><div class="nav-icon">👛</div><span>Budget</span></div>
        <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div><span>Profile</span></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
<script>
    if (typeof appInitForPage === 'function') appInitForPage();
    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
