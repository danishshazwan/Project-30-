<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/media.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div class="app-container" id="app">

    <div id="profile-page" class="screen active nav-screen">
        <div class="page-header">
            <h2>Profile</h2>
            <button class="icon-btn" onclick="logout()" title="Log Out" style="color: var(--danger-text); background: var(--danger-bg); border: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>

        <div class="profile-header-card">
            <div class="profile-avatar-container">
                <div class="avatar" id="prof-avatar">DS</div>
                <div class="edit-icon-btn" onclick="window.location.href='edit-profile.html'" title="Edit Profile">✎</div>
            </div>
            <div>
                <h3 id="prof-name" style="margin-bottom: 5px;">User Name</h3>
                <p id="prof-email" style="font-size: 13px; margin-bottom: 8px;">email@student.com</p>
                <span class="pro-badge">PRO MEMBER</span>
            </div>
        </div>

        <p style="margin: 0 20px 10px; font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: 1px;">SETTINGS</p>
        <div class="setting-item" onclick="window.location.href='goals.html'"><div class="s-left">🎯 Goals</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="window.location.href='savings.html'"><div class="s-left">💰 Savings</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="window.location.href='add-income.html'"><div class="s-left">💵 Income</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="window.location.href='reports.html'"><div class="s-left">📊 Reports</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="window.location.href='notifications.html'"><div class="s-left">🔔 Notifications</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="toggleTheme()"><div class="s-left">🌙 Dark Mode</div><div class="s-right">></div></div>
        <div class="setting-item" onclick="downloadStats()"><div class="s-left">📥 Export Data</div><div class="s-right">CSV ></div></div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: flex;">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">⊞</div><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='stats.html'"><div class="nav-icon">◴</div><span>Stats</span></div>
        <div class="fab" onclick="window.location.href='add-expense.html'">+</div>
        <div class="nav-item" onclick="window.location.href='budget.html'"><div class="nav-icon">👛</div><span>Budget</span></div>
        <div class="nav-item active" onclick="switchTab('profile-page', this)"><div class="nav-icon">👤</div><span>Profile</span></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/transactions.js"></script>
<script>
    if (typeof appInitForPage === 'function') appInitForPage();
    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
