<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/media.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="app-container" id="app">

    <div id="signup-page" class="screen active">
        <div class="auth-container">
            <div class="back-btn" onclick="navTo('landing-page')">←</div>
            <h1>Create Account</h1>
            <p style="margin-bottom: 30px;">Sign up to start tracking your budget.</p>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="e.g. Danish Shazwan">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="student@email.com">
            </div>
            <button class="btn btn-primary" onclick="handleLoginSignup('signup')">Sign Up</button>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jquery-ui-interactions.js"></script>
<script src="js/jquery-form-validation.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
    if (typeof appInitForPage === 'function') appInitForPage();
    else if (typeof window.appInitForPage === 'function') window.appInitForPage();
</script>
</body>
</html>
